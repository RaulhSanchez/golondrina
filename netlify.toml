[build]
  publish = "."
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

# Las páginas de éxito y productos no deben indexarse
[[headers]]
  for = "/success.html"
  [headers.values]
    X-Robots-Tag = "noindex"

# Los assets de productos no se sirven públicamente en producción
# (las láminas se entregan por email, no por URL directa)
[[headers]]
  for = "/products/*/assets/pages/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"
    Cache-Control = "no-store"
